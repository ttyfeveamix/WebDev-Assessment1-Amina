<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Class Activities</title>
</head>
<body>
    <!-- Unordered List-->
    <ul>
        <li>Faizah is cutie</li>
        <li>bleh</li>
        <li>😊😍</li>
        <li>Amina</li>
        <li>Saad</li>

        <li>bleh</li>
        <li>😊😍</li>
        <li>Amina</li>
        <li>Saad</li>

    <dl>
        <dt>Faizah</dt>
        <dd>cutie</dd>
        <dt>Amina</dt>
        <dd>smart</dd>
        <dt>Saad</dt>
